# AI Email Response System Configuration

dataset:
  path: "data/email_dataset.json"
  min_pairs: 50
  train_test_split: 0.8
  synthetic_size: 100  # Number of synthetic email pairs to generate

embeddings:
  model: "all-MiniLM-L6-v2"
  # Alternative: "all-mpnet-base-v2" (higher quality, slower)
  dimension: 384
  batch_size: 32
  
vector_store:
  type: "chromadb"
  persistence_dir: "data/embeddings"
  collection_name: "email_embeddings"

llm:
  primary: "lm_studio"
  lm_studio_url: "http://127.0.0.1:1234/v1"
  timeout: 30
  
  # Optional fallback configuration
  fallback_provider: null  # "openai" | "anthropic" | null
  fallback_api_key: null

generation:
  temperature: 0.7
  max_tokens: 500
  top_k_examples: 3
  prompt_template: "few_shot"  # "few_shot" | "zero_shot"

evaluation:
  dimensions:
    - semantic_similarity
    - tone_appropriateness
    - completeness
    - professionalism
    - coherence
  
  thresholds:
    high_quality:
      semantic_similarity: 0.8
      llm_judge_dimensions: 4.0
    acceptable:
      semantic_similarity: 0.6
      llm_judge_dimensions: 3.0
  
  llm_judge_model: "lm_studio"  # Use same LLM for judging
  
  supplementary_metrics:
    - rouge
    - bleu
  
  batch_size: 10  # Process evaluations in batches

output:
  format: "json"
  per_response_detail: true
  summary_report: true
  output_dir: "results"
  save_evaluations: true

logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR
  format: "json"  # "json" | "text"
  log_dir: "logs"
  log_file: "ai_email_system.log"
  console_output: true
